{% extends "_base.html" %}
{% block title %}Insert &mdash; MiniVecDB{% endblock %}

{% block content %}
  <div class="card">
    <h2 style="margin-top:0;">Insert a document</h2>

    {% if inserted_id %}
      <div class="ok">
        Inserted! New record id: <code>{{ inserted_id }}</code>
      </div>
    {% endif %}
    {% if error %}
      <div class="error">{{ error }}</div>
    {% endif %}

    <form action="{{ url_for('insert') }}" method="post">
      <div style="margin-bottom: 0.75rem;">
        <label for="text">Text</label>
        <textarea id="text" name="text" required placeholder="Paste or type the document text here...">{{ text or "" }}</textarea>
      </div>

      <label>Metadata (optional key-value pairs)</label>
      <div class="row" style="margin-bottom: 0.4rem;">
        <div><input type="text" name="meta_key" placeholder="key (e.g. category)"></div>
        <div><input type="text" name="meta_value" placeholder="value (e.g. Technology)"></div>
      </div>
      <div class="row" style="margin-bottom: 0.4rem;">
        <div><input type="text" name="meta_key" placeholder="key"></div>
        <div><input type="text" name="meta_value" placeholder="value"></div>
      </div>
      <div class="row" style="margin-bottom: 0.4rem;">
        <div><input type="text" name="meta_key" placeholder="key"></div>
        <div><input type="text" name="meta_value" placeholder="value"></div>
      </div>

      <div style="margin-top: 1.5rem; display: flex; gap: 0.75rem;">
        <button type="submit">
          <svg style="width:16px;height:16px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line>
          </svg>
          Insert
        </button>
        <a href="{{ url_for('index') }}" class="btn secondary">
          <svg style="width:16px;height:16px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 18 9 12 15 6"></polyline>
          </svg>
          Home
        </a>
      </div>
    </form>
  </div>
{% endblock %}
